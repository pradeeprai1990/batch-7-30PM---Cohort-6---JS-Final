<script>

    let userNum=Number(prompt("Enter The value:--")) //10
    let tot=0
    for(let i=1;i<userNum;i++){
        
        if(userNum%i==0){
            tot=tot+i
            
        }
    }

    console.log(userNum,tot);
    
    
    if(tot==userNum){
        console.log(userNum,"Perfect Number");
        
    }
    else{
        console.log(userNum,"Not a Perfect Number");
    }
    

</script>
