<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        .modal{
            width: 300px;
            height: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            position: fixed;
            top:-1000px;
            left: 50%;
            transition: 0.5s;
            transform: translate(-50%, -50%);
        }
        .modal h2{
            text-align: center;
           padding: 10px 0px;
           font-size: 15px;
           border-bottom: 1px solid #ccc;
        }

        .modalShow{
            top: 50%;
        }
        .notification{
            position: fixed;
            top: 0px;
            right: 0px;
            
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.5s;
        }
         .notificationShow{
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="notification">
        Data Save Successfully
    </div>
    
    <div class="modal ">
        <h2>Enquire Now</h2>

        <button>Save</button>
    </div>

</body>
<script src="app.js"></script>
</html>
