<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
     <input type="password" id="password">
     <button id="btn" onclick="showHidePassword()"><i class="fa-solid fa-eye"></i></button>
</body>
<script>
   
    let passwordInput=document.getElementById("password")
    let btnElement=document.getElementById("btn")
    let passwordStatus=true
    function showHidePassword(){
        if(passwordStatus) { //True
                passwordInput.type="text"
                //input type="text" id="password">
                btnElement.innerHTML=`<i class="fa-regular fa-eye-slash"></i>`
                passwordStatus=false
                //<button id="btn" onclick="showHidePassword()">hide</button>
        } //True{}
        else{
             passwordInput.type="password"
              btnElement.innerHTML=`<i class="fa-solid fa-eye"></i>`
               passwordStatus=true
        }
    }
</script>
</html>
