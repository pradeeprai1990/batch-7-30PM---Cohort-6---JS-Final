<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            color: #222;
        }

        .shop-layout {
            width: 100%;
            min-height: 100vh;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .sidebar {
            width: 25%;
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .sidebar h2 {
            margin-bottom: 18px;
            font-size: 24px;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-group h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .filter-group ul {
            list-style: none;
        }

        .filter-group ul li {
            margin-bottom: 10px;
            color: #555;
        }

        .product-section {
            width: 75%;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        .product-image {
            
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #1d4ed8;
        }
         .product-image img{
            width: 100%;
         }
        .product-info {
            padding: 16px;
        }

        .product-info h4 {
            margin-bottom: 8px;
            font-size: 18px;
        }

        .product-info p {
            margin-bottom: 12px;
            color: #666;
            font-size: 14px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

        @media (max-width: 1200px) {
            .product-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .shop-layout {
                flex-direction: column;
            }

            .sidebar,
            .product-section {
                width: 100%;
            }

            .product-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shop-layout">
        <aside class="sidebar">
            <h2>Filters</h2>

            <div class="filter-group">
                <h3>Categories</h3>
                <ul>
                    <li>Men's Fashion</li>
                    <li>Women's Fashion</li>
                    <li>Electronics</li>
                    <li>Accessories</li>
                </ul>
            </div>

            <div class="filter-group">
                <h3>Price Range</h3>
                <ul>
                    <li>Under Rs. 500</li>
                    <li>Rs. 500 - Rs. 1000</li>
                    <li>Rs. 1000 - Rs. 2000</li>
                    <li>Above Rs. 2000</li>
                </ul>
            </div>

            <div class="filter-group">
                <h3>Brands</h3>
                <ul>
                    <li>Nike</li>
                    <li>Adidas</li>
                    <li>Puma</li>
                    <li>Levis</li>
                </ul>
            </div>
        </aside>

        <section class="product-section">
            <div class="product-grid">
               

                
            </div>
        </section>
    </div>
</body>
<script>

    let productOuter=document.querySelector(".product-grid")
    let getProducs=async()=>{
        let apiRes=await fetch('https://dummyjson.com/products')
      
        let data=await apiRes.json()
        let  products=data.products 
        let ProductItem=''
        products.forEach((productObj)=>{

            let {thumbnail,title,description,price}=productObj

           ProductItem+=` <div class="product-card">
                    <div class="product-image">
                        <img src="${thumbnail}"/>
                        </div>
                    <div class="product-info">
                        <h4>${title}</h4>
                        <p>
                        ${description}</p>
                        <div class="price">Rs. ${price}</div>
                    </div>
                </div>`
            
        })

        productOuter.innerHTML=ProductItem
   
   }
   getProducs()

</script>
</html>
